version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/interviewiq
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=interviewiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  piston:
    image: ghcr.io/engineer-man/piston
    ports:
      - "2000:2000"
    tmpfs:
      - /tmp:exec
    environment:
      - PISTON_RUN_DIR=/tmp
      - PISTON_LOG_LEVEL=info
    restart: unless-stopped

volumes:
  pgdata:
